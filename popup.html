<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Little Alchemy Read-Aloud</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1>Read-Aloud</h1>
    <p class="hint">Help early readers play Little Alchemy.</p>

    <label class="row">
      <input type="checkbox" id="enabled" />
      <span>Enable extension</span>
    </label>

    <fieldset>
      <legend>Speak when…</legend>
      <label class="row">
        <input type="checkbox" id="speakOnHover" />
        <span>Hovering an element</span>
      </label>
      <label class="row">
        <input type="checkbox" id="speakOnDrag" />
        <span>Dragging / picking up</span>
      </label>
      <label class="row">
        <input type="checkbox" id="speakOnCreate" />
        <span>A new element is created</span>
      </label>
    </fieldset>

    <fieldset>
      <legend>Voice</legend>
      <label class="row">
        <span>Speed</span>
        <input type="range" id="rate" min="0.5" max="1.5" step="0.05" />
        <output id="rateOut"></output>
      </label>
      <label class="row">
        <span>Pitch</span>
        <input type="range" id="pitch" min="0.5" max="1.8" step="0.05" />
        <output id="pitchOut"></output>
      </label>
      <label class="row">
        <span>Volume</span>
        <input type="range" id="volume" min="0" max="1" step="0.05" />
        <output id="volumeOut"></output>
      </label>
      <label class="row">
        <span>Language</span>
        <select id="lang">
          <option value="en-US">English (US)</option>
          <option value="en-GB">English (UK)</option>
          <option value="en-AU">English (AU)</option>
          <option value="es-ES">Spanish</option>
          <option value="fr-FR">French</option>
          <option value="de-DE">German</option>
        </select>
      </label>
    </fieldset>

    <button id="test">Test voice</button>

    <p class="tip">
      On the game page, click the 🎤 button (or hold <kbd>Space</kbd>) and say
      an element's name to add it to the play area.
    </p>

    <script src="popup.js"></script>
  </body>
</html>
